<script>
document.getElementById('find-route-btn').addEventListener('click', async () => {
    const address = document.getElementById('location-input').value;
    const btn = document.getElementById('find-route-btn');

    if (!address) {
        alert("Please enter a location first.");
        return;
    }

    // Change button text to show it's working
    btn.innerText = "Searching...";

    try {
        // Convert the text address to GPS coordinates using the free Nominatim API
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
        const data = await response.json();

        if (data.length > 0) {
            const lat = data[0].lat;
            const lon = data[0].lon;
            
            // Redirect to the hospitals page and pass the coordinates in the URL
            window.location.href = `hospitals.html?lat=${lat}&lon=${lon}`;
        } else {
            alert("Location not found. Please try a different address.");
            btn.innerText = "Find Route";
        }
    } catch (error) {
        console.error("Geocoding error:", error);
        alert("Error finding location. Check your internet connection.");
        btn.innerText = "Find Route";
    }
});
</script>
