</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('location-input');
        const searchBtn = document.getElementById('find-route-btn');

        if (searchBtn && searchInput) {
            const handleSearch = async () => {
                const address = searchInput.value.trim();
                
                if (!address) {
                    alert("Please enter an emergency location first.");
                    return;
                }

                // Change button text to show it's working
                const originalText = searchBtn.innerText;
                searchBtn.innerText = "Searching...";
                searchBtn.disabled = true;

                try {
                    // Ask OpenStreetMap to convert the text address into coordinates
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                    const data = await response.json();

                    if (data && data.length > 0) {
                        const lat = data[0].lat;
                        const lon = data[0].lon;
                        
                        // Success! Redirect to hospitals.html with the new coordinates in the URL
                        window.location.href = `hospitals.html?lat=${lat}&lon=${lon}`;
                    } else {
                        alert("Location not found. Please try a more specific address or city name.");
                        searchBtn.innerText = originalText;
                        searchBtn.disabled = false;
                    }
                } catch (error) {
                    console.error("Geocoding Error:", error);
                    alert("Error finding location. Check your internet connection.");
                    searchBtn.innerText = originalText;
                    searchBtn.disabled = false;
                }
            };

            // Trigger search when the button is clicked
            searchBtn.addEventListener('click', handleSearch);
            
            // UX Bonus: Trigger search when the user presses the "Enter" key
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
        }
    });
</script>
